<html lang="en">

<head>
    <meta charset="UTF-8">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"

<body>
    <div class="container text-center">
        <h3 class="text-center my-5">Random User Generator</h1>
            <div id="result" class="row justify-content-center m-5">
                <div class="col-sm-1 col-md-2 col-lg-4"></div>
                <div class="col-sm-1 col-md-2 col-lg-4">
                    <div class="card mx-auto bg-dark text-white" style="width: 18rem;">
                        <img height="50px" src="..." class="card-img-top" alt="...">
                        <div class="card-body">
                            <h5 class="card-title">${data.name}</h5>
                            <p class="card-text">Some quick example text to build on the card title and make up the bulk
                                of
                                the card’s content.</p>
                            <a href="#" class="btn btn-primary">Go somewhere</a>
                        </div>
                    </div>
                </div>
                <div class="col-sm-1 col-md-2 col-lg-4"></div>

            </div>
            <button class="btn btn-primary mx-5 " onclick="changeValue()">Click</button>
    </div>
</body>

<script>

    function APIcall(value) {
        const xhr = new XMLHttpRequest()

        xhr.open("GET", `https://dummyjson.com/users/${value}`)

        xhr.send()

        xhr.onreadystatechange = () => {
            if (xhr.readyState == 4 && xhr.status == 200) {
                const data = JSON.parse(xhr.responseText)
                console.log(data.firstName)
                result.innerHTML = `<div class="col-sm-1 col-md-2 col-lg-4"></div>
            <div class="col-sm-1 col-md-2 col-lg-4">
                <div class="card bg-dark text-white" style="width: 100%;">
                    <img height="150px" width="20px" src="${data.image}" class="card-img-top rounded-circle" alt="...">
                    <div class="card-body ">
                        <h5 class="card-title">${data.firstName}</h5>
                        <p class="card-text text-start">Age : ${data.age}</p>
                         <p class="card-text text-start">Gender : ${data.gender}</p>
                         <p class="card-text text-start">Email : ${data.email}</p>
                         <p class="card-text text-start">phone : ${data.phone}</p>
                        
                    </div>
                </div>
            </div>
            <div class="col-sm-1 col-md-2 col-lg-4"></div>`
            } else {
                console.log("API CALL FAILED")
            }
        }
    }

    APIcall(3)

    const changeValue = () => {
        let newValue = Math.floor(Math.random() * 10) + 1
        console.log(newValue)
        APIcall(newValue)
    }



</script>

</html>
